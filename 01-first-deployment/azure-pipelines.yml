trigger: 
- main

variables: 
  IMAGE_NAME: anuroopmgsq.azurecr.io/python-azure-storage
  TAG: $(Build.BuildId)

stages:
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: Build
    pool: 
      name: self-hosted-agents
    
    steps:
    - script: |
        echo "Building Docker Image..!!!"
        docker build -t $(IMAGE_NAME):$(TAG) 01-first-deployment
      displayName: Build Image

    - script: |
        echo "Logging into ACR using managed identity"
        az login --identity --client-id $(CLIENT_ID)
        az acr login --name anuroopmgsq
      displayName: ACR Login using User Managed Identity

    - script: |
        echo "Pushing Image"
        docker push $(IMAGE_NAME):$(TAG)
      displayName: Push Images

- stage: Deploy_Dev
  displayName: Deploy to Dev
  dependsOn: Build   # Will start only if Build stage gets successful

  jobs:
  - job: DeployDev
    pool: 
      name: self-hosted-agents

    steps:

    - script: |
        set -e
        echo "Logging into Azure..."
        az login --identity --client-id $(CLIENT_ID)
        az aks get-credentials --resource-group rg-hubspoke-dev --name aks-hubspoke-dev --overwrite-existing

        helm upgrade --install blob-app-dev 01-first-deployment/helm-chart/blob-app \
        -n dev \
        -f 01-first-deployment/helm-chart/blob-app/values-dev.yaml\
        --set image.tag=$(TAG)

        echo "Verifying rollout.."
        if ! kubectl rollout status deploy/blob-app --timeout=60s; then
          echo "Deployment Failed! Rolling back to previous stable version"

          LAST_STABLE_REVISION=$(helm history blob-app -ojson | jq '.[-2].revision')

          echo "Rolling back to previous stable version $LAST_STABLE_VERSION"
          helm rollback blob-app $LAST_STABLE_VERSION

          echo "Verifying Rollback..."
          ROLLBACK_STATUS=$(helm status blob-app -ojson | jq -r .info.status)

          if [ "$ROLLBACK_STATUS" == "deployed"]; then
            echo "Rollback confirmed by helm"
            kubectl rollout status deploy/blob-app --timeout=60s
          else
            echo "Rollback failed or struck in $ROLLBACK_STATUS"
            exit 1
          fi
        fi
      displayName: Deployment to Dev

- stage: Deploy_prod
  dependsOn: Deploy_Dev  # Stage Name
  condition: succeeded()

  jobs:
  - job: DeployProd
    pool: self-hosted-agents
    
    steps:
    - script: |
        set -e
        echo "Logging into Azure..."
        az login --identity --client-id $(CLIENT_ID)
        az aks get-credentials --resource-group rg-hubspoke-dev --name aks-hubspoke-dev --overwrite-existing

        helm upgrade --install blob-app-prod 01-first-deployment/helm-chart/blob-app \
        -n prod \
        -f 01-first-deployment/helm-chart/blob-app/values-prod.yaml \
        --set image.tag=$(TAG)

        echo "Verifying rollout.."
        if ! kubectl rollout status deploy/blob-app --timeout=60s; then
          echo "Deployment Failed! Rolling back to previous stable version"

          LAST_STABLE_REVISION=$(helm history blob-app -ojson | jq '.[-2].revision')

          echo "Rolling back to previous stable version $LAST_STABLE_VERSION"
          helm rollback blob-app $LAST_STABLE_VERSION

          echo "Verifying Rollback..."
          ROLLBACK_STATUS=$(helm status blob-app -ojson | jq -r .info.status)

          if [ "$ROLLBACK_STATUS" == "deployed"]; then
            echo "Rollback confirmed by helm"
            kubectl rollout status deploy/blob-app --timeout=60s
          else
            echo "Rollback failed or struck in $ROLLBACK_STATUS"
            exit 1
          fi
        fi
      displayName: Deployment to Prod

  
