trigger: 
- main

variables: 
  IMAGE_NAME: anuroopmgsq.azurecr.io/python-azure-storage
  TAG: $(Build.BuildId)

stages:
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: Build
    pool: 
      name: self-hosted-agents
    
    steps:
    - script: |
        echo "Building Docker Image..!!!"
        docker build -t $(IMAGE_NAME):$(TAG) 01-first-deployment
      displayName: Build Image

    - script: |
        echo "Tagging Image"
        docker tag $(IMAGE_NAME):$(TAG) $(IMAGE_NAME):latest
      displayName: Tag Image

    - script: |
        echo "Logging into ACR using managed identity"
        az login --identity --client-id $(CLIENT_ID)
        az acr login --name anuroopmgsq
      displayName: ACR Login using User Managed Identity

    - script: |
        echo "Pushing Image"
        docker push $(IMAGE_NAME):$(TAG)
        docker push $(IMAGE_NAME):latest
      displayName: Push Images

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build   # Will start only if Build stage gets successful

  jobs:
  - job: Deploy
    pool: 
      name: self-hosted-agents

    steps:

    - script: |
        echo "Logging into Azure..."
        az login --identity --client-id $(CLIENT_ID)
        echo "Fetching AKS credentials..."
        az aks get-credentials --resource-group rg-hubspoke-dev --name aks-hubspoke-dev --overwrite-existing
      displayName: Authenticate and Set K8s Context

    - script: |
        echo "Applying K8s Manifests"
        kubectl apply -f 01-first-deployment/k8s
      displayName: Apply Manifests

    - script: |
        echo "Updating deployment with new images"
        kubectl set image deploy/blob-app \
          app=$(IMAGE_NAME):$(TAG)
      displayName: Update Image tag

    - script: |
        echo "Waiting for rollout.."
        kubectl rollout status deploy/blob-app
      displayName: Verify Deployment